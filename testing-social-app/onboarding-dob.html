<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add your date of birth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#2563eb;
    --blue-dark:#1d4ed8;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --bg:#f8fafc;
  }
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px;
  }
  .phone{
    width:100%;
    max-width:360px;
    background:#fff;
    border-radius:32px;
    padding:32px 24px;
    display:flex;
    flex-direction:column;
    box-shadow:0 4px 24px rgba(15,23,42,.06);
  }
  .icon{font-size:54px;text-align:center;margin:24px 0 16px}
  h1{
    color:var(--blue);
    font-size:24px;
    text-align:center;
    margin-bottom:8px;
  }
  .sub{color:var(--muted);text-align:center;margin-bottom:28px;font-size:14px}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
  select{
    width:100%;
    padding:14px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    font-size:14px;
    color:var(--text);
    appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath fill='%2364748b' d='M5 6L0 0h10z'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 12px center;
  }
  .btn{
    width:100%;
    padding:14px;
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:background .2s;
  }
  .btn:hover{background:var(--blue-dark)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .back{
    margin-top:auto;
    text-align:center;
    color:var(--blue);
    text-decoration:none;
    font-size:14px;
    padding-top:32px;
  }
  .err{color:#dc2626;font-size:13px;text-align:center;margin-bottom:12px;min-height:18px}
</style>
</head>
<body>
  <div class="phone">
    <div class="icon">🎉</div>
    <h1>Add your date of birth</h1>
    <p class="sub">So that we'll never forget your Birthday.</p>

    <div class="err" id="err"></div>

    <div class="row">
      <select id="month"><option value="">Month</option></select>
      <select id="day"><option value="">Day</option></select>
      <select id="year"><option value="">Year</option></select>
    </div>

    <button class="btn" id="next">Next</button>

    <a class="back" href="login.html">← Back to Sign Up</a>
  </div>

<script>
const API_BASE = "http://localhost:5001/api";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";

const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const monthSel = document.getElementById("month");
const daySel = document.getElementById("day");
const yearSel = document.getElementById("year");

months.forEach((m,i)=>monthSel.add(new Option(m, i+1)));
for(let d=1; d<=31; d++) daySel.add(new Option(d, d));
const thisYear = new Date().getFullYear();
for(let y=thisYear; y>=thisYear-100; y--) yearSel.add(new Option(y, y));

document.getElementById("next").addEventListener("click", async () => {
  const err = document.getElementById("err");
  err.textContent = "";
  const m = monthSel.value, d = daySel.value, y = yearSel.value;
  if (!m || !d || !y) { err.textContent = "Please select your full date of birth"; return; }
  const dob = `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  try {
    const r = await fetch(API_BASE + "/auth/personal_info", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ dob }),
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.message || "Failed to save"; return; }
    location.href = "onboarding-gender.html";
  } catch { err.textContent = "Server error"; }
});
</script>
</body>
</html>
