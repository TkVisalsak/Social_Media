<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>People Suggestions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#2563eb;
    --blue-dark:#1d4ed8;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --bg:#f8fafc;
  }
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px;
  }
  .phone{
    width:100%;
    max-width:380px;
    background:#fff;
    border-radius:32px;
    padding:24px 18px;
    display:flex;
    flex-direction:column;
    box-shadow:0 4px 24px rgba(15,23,42,.06);
  }
  h1{color:var(--blue);font-size:20px;text-align:center;margin-bottom:18px}
  .contacts-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;
  }
  .contacts-row .left{display:flex;align-items:center;gap:10px}
  .contacts-row .icon{
    width:38px;height:38px;border-radius:50%;background:#f1f5f9;
    display:flex;align-items:center;justify-content:center;font-size:18px;
  }
  .small-link{color:var(--blue);font-weight:600;font-size:14px}
  .small-sub{color:var(--muted);font-size:12px}
  .pill-btn{
    padding:8px 18px;border-radius:20px;background:var(--blue);color:#fff;
    border:none;font-weight:600;font-size:13px;cursor:pointer;
  }
  .pill-btn.outline{background:transparent;color:var(--blue);border:1px solid var(--blue)}
  .pill-btn:hover{background:var(--blue-dark)}
  .person{
    display:flex;align-items:center;gap:12px;padding:10px 4px;
  }
  .person .avatar{
    width:42px;height:42px;border-radius:50%;background:#dbeafe;
    background-size:cover;background-position:center;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#1e40af;font-weight:700;
  }
  .person .info{flex:1;min-width:0}
  .person .name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px}
  .person .verified{color:var(--blue)}
  .person .matches{color:var(--muted);font-size:12px}
  .person .x{
    color:var(--muted);cursor:pointer;font-size:18px;padding:0 6px;
  }
  .list{flex:1;overflow-y:auto;max-height:60vh;margin-bottom:14px}
  .empty{padding:24px;text-align:center;color:var(--muted);font-size:14px}
  .err{color:#dc2626;font-size:13px;text-align:center;min-height:18px}
  .btn{
    width:100%;padding:14px;background:var(--blue);color:#fff;
    border:none;border-radius:24px;font-size:16px;font-weight:700;cursor:pointer;
  }
  .btn:hover{background:var(--blue-dark)}
  .skip{display:block;text-align:center;color:var(--muted);text-decoration:none;font-size:13px;margin-top:10px}
</style>
</head>
<body>
  <div class="phone">
    <h1>People Suggestions</h1>

    <div class="contacts-row">
      <div class="left">
        <div class="icon">📞</div>
        <div>
          <div class="small-link">Connect Contacts</div>
          <div class="small-sub">Follow people you know</div>
        </div>
      </div>
      <button class="pill-btn">Connect</button>
    </div>

    <div class="list" id="list">
      <div class="empty">Loading suggestions…</div>
    </div>

    <div class="err" id="err"></div>
    <button class="btn" id="continue">Continue</button>
    <a class="skip" href="display.html">Skip for now</a>
  </div>

<script>
const API_BASE = "http://localhost:5001/api";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";

const list = document.getElementById("list");

function initials(u) {
  const f = (u.firstName || u.userName || "?")[0];
  const l = (u.lastName || "")[0] || "";
  return (f + l).toUpperCase();
}

async function load() {
  try {
    const r = await fetch(API_BASE + "/hobbies/suggestions?min=3", {
      headers: { Authorization: "Bearer " + token },
    });
    const data = await r.json();

    if (!r.ok) {
      list.innerHTML = `<div class="empty">${data.message || "Failed to load"}</div>`;
      return;
    }
    const users = data.suggestions || [];
    if (users.length === 0) {
      list.innerHTML = `<div class="empty">${data.message || "No matches yet — try adding more interests."}</div>`;
      return;
    }

    list.innerHTML = "";
    users.forEach(u => {
      const row = document.createElement("div");
      row.className = "person";
      row.dataset.id = u._id;
      const avatar = u.profilePic
        ? `<div class="avatar" style="background-image:url('${u.profilePic}')"></div>`
        : `<div class="avatar">${initials(u)}</div>`;
      row.innerHTML = `
        ${avatar}
        <div class="info">
          <div class="name">${u.userName || (u.firstName + " " + u.lastName)} <span class="verified">✔</span></div>
          <div class="matches">${u.matchCount} shared interests</div>
        </div>
        <button class="pill-btn outline follow-btn">Follow</button>
        <span class="x">×</span>
      `;
      row.querySelector(".follow-btn").addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true;
        try {
          const fr = await fetch(API_BASE + "/follow/" + u._id, {
            method: "POST",
            headers: { Authorization: "Bearer " + token },
          });
          if (fr.ok) {
            btn.textContent = "Following";
            btn.classList.remove("outline");
          } else {
            btn.disabled = false;
          }
        } catch { btn.disabled = false; }
      });
      row.querySelector(".x").addEventListener("click", () => row.remove());
      list.appendChild(row);
    });
  } catch {
    list.innerHTML = `<div class="empty">Server error</div>`;
  }
}

document.getElementById("continue").addEventListener("click", () => {
  location.href = "display.html";
});

load();
</script>
</body>
</html>
