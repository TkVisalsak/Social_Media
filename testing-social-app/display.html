<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #18181c;
      --surface2:  #1e1e24;
      --border:    #2a2a32;
      --accent:    #ff2d55;
      --accent-lo: rgba(255,45,85,.10);
      --save-color:  #f5a623;
      --save-lo:     rgba(245,166,35,.12);
      --repost-color:#22d3a5;
      --repost-lo:   rgba(34,211,165,.12);
      --follow-color:#7c6df8;
      --follow-lo:   rgba(124,109,248,.12);
      --text:      #f0f0f5;
      --muted:     #7a7a8c;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Top nav ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      transition: all .2s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .nav-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .nav-btn.primary:hover { opacity: .85; }

    /* ── Feed container ── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 16px 0;
    }

    .feed-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 24px;
      letter-spacing: -.3px;
    }

    /* ── Post card ── */
    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Post header ── */
    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-lo);
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .post-author {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .username {
      font-weight: 600;
      font-size: 14px;
    }
    /* ── Follow button (header) ── */
    .follow-btn {
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--follow-color);
      color: var(--follow-color);
      background: var(--follow-lo);
      transition: all .18s;
      white-space: nowrap;
    }
    .follow-btn:hover,
    .follow-btn.following {
      background: var(--follow-color);
      color: #fff;
    }
    .follow-btn.following { opacity: .85; }
    .follow-btn:disabled {
      opacity: .45;
      cursor: default;
    }

    /* ── Media ── */
    .post-media img,
    .post-media video {
      width: 100%;
      display: block;
      max-height: 480px;
      object-fit: cover;
      background: var(--bg);
    }

    /* ── Caption ── */
    .post-caption {
      padding: 12px 16px 4px;
      font-size: 14px;
      line-height: 1.55;
      color: #ccc;
    }

    /* ── Actions row ── */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      flex-wrap: wrap;
    }

    /* shared pill button style */
    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .18s;
      white-space: nowrap;
    }
    .action-btn:disabled { opacity: .5; cursor: default; }

    /* Like */
    .like-btn {
      background: var(--accent-lo);
      color: var(--accent);
    }
    .like-btn:hover,
    .like-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Repost */
    .repost-btn {
      background: var(--repost-lo);
      color: var(--repost-color);
    }
    .repost-btn:hover,
    .repost-btn.active {
      background: var(--repost-color);
      color: #fff;
    }

    /* Save */
    .save-btn {
      background: var(--save-lo);
      color: var(--save-color);
    }
    .save-btn:hover,
    .save-btn.active {
      background: var(--save-color);
      color: #fff;
    }

    .like-count {
      font-size: 13px;
      color: var(--muted);
      margin-left: 2px;
    }

    /* ── Toast notification ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Comment box ── */
    .comment-box {
      display: flex;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .comment-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .comment-input:focus { border-color: var(--accent); }
    .comment-send-btn {
      padding: 9px 16px;
      background: var(--accent);
      border: none;
      border-radius: 20px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .18s;
    }
    .comment-send-btn:hover { opacity: .85; }

    /* ── Comments list ── */
    .comments-list {
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
    }
    .comment-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 9px 11px;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.45;
    }
    .comment-item b { color: var(--text); }
    .comment-meta {
      margin-top: 6px;
      display: flex;
      gap: 8px;
    }
    .meta-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      transition: color .15s;
    }
    .meta-btn:hover { color: var(--text); }
    .meta-btn.del:hover { color: var(--accent); }
    .reply-container {
      margin-left: 14px;
      border-left: 2px solid var(--border);
      padding-left: 10px;
      margin-top: 6px;
    }
    .reply-box { margin-top: 6px; }
    .reply-box input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      outline: none;
      width: 65%;
    }
    .reply-box button {
      margin-left: 6px;
      padding: 6px 12px;
      background: var(--accent);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Loading / empty states ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .feed-title { font-size: 22px; }
      .post-media img,
      .post-media video { max-height: 320px; }
      .post-actions { gap: 6px; }
      .action-btn { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="display.html">🔥 demo-post</a>
    <div class="nav-actions">
      <a class="nav-btn primary" href="create-post.html">+ Post</a>
      <button class="nav-btn" id="logoutBtn">Log out</button>
    </div>
  </header>

  <main>
    <div class="feed-title">Feed</div>
    <div id="feed">
      <div class="state-msg">
        <div class="spinner"></div>
        Loading posts…
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    const API_BASE = "http://localhost:5001/api";

    /* ── Auth ── */
    function getToken() { return localStorage.getItem("token"); }
    function getCurrentUserId() { return localStorage.getItem("userId"); }

    function requireAuth() {
      if (!getToken()) {
        alert("Please login first");
        window.location.href = "/login.html";
        return false;
      }
      return true;
    }

    if (!requireAuth()) throw new Error("No token");

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    });

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    /* ── API wrapper ── */
    async function api(url, options = {}) {
      const token = getToken();
      const res = await fetch(API_BASE + url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {}),
        },
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.message || "Request failed");
      return data;
    }

    /* ══════════════════════════════════════
       ── FOLLOW ──
    ══════════════════════════════════════ */
    async function initFollow(authorId, btn) {
      const currentUserId = getCurrentUserId();

      // Hide follow btn if viewing own post
      if (currentUserId && currentUserId === authorId) {
        btn.style.display = "none";
        return;
      }

      // Check current follow status
      try {
        const data = await api(`/follow/following/${authorId}`);
        // API returns list of people the current user follows
        const isFollowing = Array.isArray(data)
          ? data.some(u => u._id === authorId || u === authorId)
          : !!data?.isFollowing;
        setFollowState(btn, isFollowing);
      } catch {
        setFollowState(btn, false);
      }

      btn.addEventListener("click", async () => {
        if (btn.disabled) return;
        btn.disabled = true;
        const currently = btn.classList.contains("following");
        try {
          if (currently) {
            await api(`/follow/unfollow/${authorId}`, { method: "DELETE" });
            setFollowState(btn, false);
            showToast("Unfollowed");
          } else {
            await api(`/follow/${authorId}`, { method: "POST" });
            setFollowState(btn, true);
            showToast("Following ✓");
          }
        } catch (err) {
          showToast("❌ " + err.message);
        } finally {
          btn.disabled = false;
        }
      });
    }

    function setFollowState(btn, isFollowing) {
      if (isFollowing) {
        btn.textContent = "✓ Following";
        btn.classList.add("following");
      } else {
        btn.textContent = "+ Follow";
        btn.classList.remove("following");
      }
    }

    /* ══════════════════════════════════════
       ── REPOST ──
    ══════════════════════════════════════ */
    async function initRepost(feedId, btn) {
      // Optimistically show state; no check endpoint in provided routes
      btn.addEventListener("click", async () => {
        if (btn.disabled) return;
        if (btn.classList.contains("active")) {
          showToast("Already reposted");
          return;
        }
        btn.disabled = true;
        try {
          await api(`/repost/feed`, {
            method: "POST",
            body: JSON.stringify({ contentId: feedId, contentType: "feed" }),
          });
          btn.classList.add("active");
          btn.innerHTML = "🔁 Reposted";
          showToast("Reposted ✓");
        } catch (err) {
          showToast("❌ " + err.message);
        } finally {
          btn.disabled = false;
        }
      });
    }

    /* ══════════════════════════════════════
       ── SAVE ──
    ══════════════════════════════════════ */
    async function initSave(feedId, btn) {
      // Check saved status
      try {
        const data = await api(`/save/check/${feedId}`);
        setSaveState(btn, !!data?.isSaved);
      } catch {
        setSaveState(btn, false);
      }

      btn.addEventListener("click", async () => {
        if (btn.disabled) return;
        btn.disabled = true;
        const currently = btn.classList.contains("active");
        try {
          if (currently) {
            await api(`/save/${feedId}`, { method: "DELETE" });
            setSaveState(btn, false);
            showToast("Removed from saved");
          } else {
            await api(`/save`, {
              method: "POST",
              body: JSON.stringify({ contentId: feedId, contentType: "feed" }),
            });
            setSaveState(btn, true);
            showToast("Saved ✓");
          }
        } catch (err) {
          showToast("❌ " + err.message);
        } finally {
          btn.disabled = false;
        }
      });
    }

    function setSaveState(btn, isSaved) {
      if (isSaved) {
        btn.innerHTML = "🔖 Saved";
        btn.classList.add("active");
      } else {
        btn.innerHTML = "🔖 Save";
        btn.classList.remove("active");
      }
    }

    /* ══════════════════════════════════════
       ── LIKE ──
    ══════════════════════════════════════ */
    async function toggleLike(feedId, btn, countEl) {
      const data      = await api(`/likes/${feedId}`, { method: "POST" });
      const countData = await api(`/likes/${feedId}/count`);
      countEl.textContent = countData.likes + " likes";
      btn.innerHTML       = data.liked ? "❤️ Liked" : "🤍 Like";
      btn.classList.toggle("active", data.liked);
    }

    /* ══════════════════════════════════════
       ── COMMENTS ──
    ══════════════════════════════════════ */
    async function loadComments(feedId, container) {
      const data = await api(`/comments/${feedId}`);
      container.innerHTML = "";

      if (!data.comments.length) {
        container.innerHTML = `<p style="color:var(--muted);font-size:13px">No comments yet.</p>`;
        return;
      }

      data.comments.forEach(comment => {
        const div = document.createElement("div");
        div.className = "comment-item";
        div.innerHTML = `
          <b>${comment.userId?.userName || "User"}</b>: ${comment.text}
          <div class="comment-meta">
            <button class="meta-btn reply-toggle">↩ Reply</button>
            <button class="meta-btn del" data-id="${comment._id}">✕ Delete</button>
          </div>
          <div class="reply-box"></div>
        `;

        div.querySelector(".del").addEventListener("click", () => deleteComment(comment._id, feedId, container));
        div.querySelector(".reply-toggle").addEventListener("click", function() {
          toggleReplyInput(feedId, comment._id, div.querySelector(".reply-box"));
        });

        if (comment.replies?.length) {
          const repliesDiv = document.createElement("div");
          repliesDiv.className = "reply-container";
          comment.replies.forEach(reply => {
            const r = document.createElement("div");
            r.className = "comment-item";
            r.innerHTML = `
              <b>${reply.userId?.userName || "User"}</b>: ${reply.text}
              <div class="comment-meta">
                <button class="meta-btn del" data-id="${reply._id}">✕ Delete</button>
              </div>
            `;
            r.querySelector(".del").addEventListener("click", () => deleteComment(reply._id, feedId, container));
            repliesDiv.appendChild(r);
          });
          div.appendChild(repliesDiv);
        }

        container.appendChild(div);
      });
    }

    function toggleReplyInput(feedId, parentId, box) {
      if (box.innerHTML) { box.innerHTML = ""; return; }
      box.innerHTML = `<input placeholder="Reply…" /><button>Send</button>`;
      const input = box.querySelector("input");
      box.querySelector("button").onclick = async () => {
        if (!input.value.trim()) return;
        await api(`/comments/${feedId}`, {
          method: "POST",
          body: JSON.stringify({ text: input.value.trim(), parentId }),
        });
        loadComments(feedId, box.closest(".comments-list"));
      };
    }

    async function addComment(feedId, input, container) {
      if (!input.value.trim()) return;
      await api(`/comments/${feedId}`, {
        method: "POST",
        body: JSON.stringify({ text: input.value.trim() }),
      });
      input.value = "";
      loadComments(feedId, container);
    }

    async function deleteComment(commentId, feedId, container) {
      if (!confirm("Delete this comment?")) return;
      await api(`/comments/${commentId}`, { method: "DELETE" });
      loadComments(feedId, container);
    }

    /* ══════════════════════════════════════
       ── BUILD POST CARD ──
    ══════════════════════════════════════ */
    function buildPost(feed) {
      const feedId   = feed._id;
      const authorId = feed.userId?._id || feed.userId;
      const media    = feed.media?.[0];

      const article = document.createElement("article");
      article.className = "post";

      const mediaHTML = media
        ? (media.type === "video"
            ? `<div class="post-media"><video controls src="${media.url}"></video></div>`
            : `<div class="post-media"><img src="${media.url}" alt="post image" loading="lazy" /></div>`)
        : "";

      article.innerHTML = `
        <div class="post-header">
          <div class="avatar">👤</div>
          <div class="post-author">
            <span class="username">${feed.userId?.userName || "Unknown"}</span>
            <button class="follow-btn" data-author="${authorId}">+ Follow</button>
          </div>
        </div>
        ${mediaHTML}
        ${feed.caption ? `<div class="post-caption">${feed.caption}</div>` : ""}
        <div class="post-actions">
          <button class="action-btn like-btn" id="like-${feedId}">🤍 Like</button>
          <span class="like-count" id="count-${feedId}">0 likes</span>
          <button class="action-btn repost-btn" id="repost-${feedId}">🔁 Repost</button>
          <button class="action-btn save-btn"   id="save-${feedId}">🔖 Save</button>
        </div>
        <div class="comment-box">
          <input class="comment-input" id="input-${feedId}" placeholder="Add a comment…" />
          <button class="comment-send-btn" id="send-${feedId}">Post</button>
        </div>
        <div class="comments-list" id="comments-${feedId}"></div>
      `;

      /* wire up elements */
      const likeBtn    = article.querySelector(`#like-${feedId}`);
      const countEl    = article.querySelector(`#count-${feedId}`);
      const repostBtn  = article.querySelector(`#repost-${feedId}`);
      const saveBtn    = article.querySelector(`#save-${feedId}`);
      const followBtn  = article.querySelector(`.follow-btn[data-author="${authorId}"]`);
      const input      = article.querySelector(`#input-${feedId}`);
      const sendBtn    = article.querySelector(`#send-${feedId}`);
      const commentBox = article.querySelector(`#comments-${feedId}`);

      /* Like */
      likeBtn.addEventListener("click", () => toggleLike(feedId, likeBtn, countEl));
      api(`/likes/${feedId}/count`).then(d => {
        countEl.textContent = d.likes + " likes";
      }).catch(() => {});

      /* Follow */
      if (authorId) initFollow(authorId, followBtn);

      /* Repost */
      initRepost(feedId, repostBtn);

      /* Save */
      initSave(feedId, saveBtn);

      /* Comments */
      sendBtn.addEventListener("click", () => addComment(feedId, input, commentBox));
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") addComment(feedId, input, commentBox);
      });
      loadComments(feedId, commentBox);

      return article;
    }

    /* ══════════════════════════════════════
       ── LOAD FEED ──
    ══════════════════════════════════════ */
    async function loadFeed() {
      const feedEl = document.getElementById("feed");
      try {
        const response = await api("/feeds");
        const feeds = response.data || [];
        feedEl.innerHTML = "";

        if (!feeds.length) {
          feedEl.innerHTML = `<div class="state-msg">No posts yet. Be the first!</div>`;
          return;
        }

        feeds.forEach(feed => feedEl.appendChild(buildPost(feed)));

      } catch (err) {
        console.error(err);
        feedEl.innerHTML = `<div class="state-msg">❌ Failed to load feed: ${err.message}</div>`;
      }
    }

    loadFeed();
  </script>
</body>
</html>
